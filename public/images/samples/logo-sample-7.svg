<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="100%" height="100%">
  <defs>
    <filter id="shadowS7" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- LEFT STUDIO ZONE (Center at x=70, y=70): Oxford Laurel Wreath & Torch -->
  <g transform="translate(10, 10)" filter="url(#shadowS7)">
    <!-- Left & Right Symmetric Laurel Branches -->
    <path d="M 60 110 Q 14 100 14 60 Q 14 24 46 16" fill="none" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 60 110 Q 106 100 106 60 Q 106 24 74 16" fill="none" stroke="#166534" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Left Laurel Leaves -->
    <g fill="#166534">
      <path d="M 18 78 C 10 74 14 62 24 66 Z"/>
      <path d="M 14 56 C 8 50 14 38 24 44 Z"/>
      <path d="M 20 36 C 16 28 24 18 34 26 Z"/>
      <path d="M 32 22 C 32 14 42 8 48 16 Z"/>
    </g>

    <!-- Right Laurel Leaves -->
    <g fill="#166534">
      <path d="M 102 78 C 110 74 106 62 96 66 Z"/>
      <path d="M 106 56 C 112 50 106 38 96 44 Z"/>
      <path d="M 100 36 C 104 28 96 18 86 26 Z"/>
      <path d="M 88 22 C 88 14 78 8 72 16 Z"/>
    </g>

    <!-- Bottom Ribbon Tie -->
    <path d="M 50 110 Q 60 116 70 110 Q 65 106 60 108 Q 55 106 50 110 Z" fill="#d4af37"/>

    <!-- Central Vertical Torch of Wisdom -->
    <rect x="56" y="50" width="8" height="50" rx="2" fill="#0f172a"/>
    <path d="M 52 50 L 68 50 L 65 42 L 55 42 Z" fill="#d4af37"/>
    <!-- Torch Flame -->
    <path d="M 60 20 C 68 28 70 34 60 42 C 50 34 52 28 60 20 Z" fill="#a81c1c"/>
    <path d="M 60 28 C 64 32 65 36 60 40 C 55 36 56 32 60 28 Z" fill="#facc15"/>
  </g>

  <!-- RIGHT STUDIO ZONE (x=145 to 470): Exact Requested Typography Writing Colors & Hierarchy -->
  <g transform="translate(148, 0)">
    <!-- Main Wordmark: EURO (Solid Black) + WORLD (Crimson Red) -->
    <text x="0" y="68" font-family="'Times New Roman', 'Georgia', 'Cinzel', serif" font-size="44" font-weight="900" letter-spacing="1.5px">
      <tspan fill="#0f172a">EURO</tspan><tspan fill="#a81c1c">WORLD</tspan>
    </text>

    <!-- Studio-Grade Precision Divider Line -->
    <line x1="2" y1="80" x2="315" y2="80" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="80" x2="85" y2="80" stroke="#a81c1c" stroke-width="3" stroke-linecap="round"/>

    <!-- Subtitle: EDUCATION CONSULTANTS (Solid Slate/Black) -->
    <text x="2" y="102" font-family="'Segoe UI', 'Outfit', system-ui, sans-serif" font-size="13.5" font-weight="800" fill="#1e293b" letter-spacing="4.5px">
      EDUCATION CONSULTANTS
    </text>
  </g>
</svg>
