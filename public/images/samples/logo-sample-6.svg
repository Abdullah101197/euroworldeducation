<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="100%" height="100%">
  <defs>
    <filter id="shadowS6" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- LEFT STUDIO ZONE (Center at x=70, y=70): Swiss Minimalist Compass & Globe -->
  <g transform="translate(10, 10)" filter="url(#shadowS6)">
    <!-- Outer Precision Ring -->
    <circle cx="60" cy="60" r="48" fill="#ffffff" stroke="#0f172a" stroke-width="2.5"/>
    <circle cx="60" cy="60" r="40" fill="none" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Compass Degree Ticks -->
    <line x1="60" y1="12" x2="60" y2="18" stroke="#0f172a" stroke-width="2"/>
    <line x1="60" y1="102" x2="60" y2="108" stroke="#0f172a" stroke-width="2"/>
    <line x1="12" y1="60" x2="18" y2="60" stroke="#0f172a" stroke-width="2"/>
    <line x1="102" y1="60" x2="108" y2="60" stroke="#0f172a" stroke-width="2"/>

    <!-- Globe Grid Lines inside Compass -->
    <ellipse cx="60" cy="60" rx="20" ry="40" fill="none" stroke="#f1f5f9" stroke-width="1.5"/>
    <line x1="20" y1="60" x2="100" y2="60" stroke="#f1f5f9" stroke-width="1.5"/>

    <!-- Navigational Compass Needle Pointing North-East (Towards Global Success) -->
    <g transform="translate(60, 60) rotate(35)">
      <!-- North-East Pointer (Crimson Red) -->
      <polygon points="0,-38 6,0 0,-6 -6,0" fill="#a81c1c"/>
      <!-- South-West Pointer (Navy) -->
      <polygon points="0,38 6,0 0,6 -6,0" fill="#0f172a"/>
      <!-- Center Pivot Hub -->
      <circle cx="0" cy="0" r="6" fill="#d4af37" stroke="#ffffff" stroke-width="1.5"/>
    </g>
  </g>

  <!-- RIGHT STUDIO ZONE (x=145 to 470): Exact Requested Typography Writing Colors & Hierarchy -->
  <g transform="translate(148, 0)">
    <!-- Main Wordmark: EURO (Solid Black) + WORLD (Crimson Red) -->
    <text x="0" y="68" font-family="'Times New Roman', 'Georgia', 'Cinzel', serif" font-size="44" font-weight="900" letter-spacing="1.5px">
      <tspan fill="#0f172a">EURO</tspan><tspan fill="#a81c1c">WORLD</tspan>
    </text>

    <!-- Studio-Grade Precision Divider Line -->
    <line x1="2" y1="80" x2="315" y2="80" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="80" x2="85" y2="80" stroke="#a81c1c" stroke-width="3" stroke-linecap="round"/>

    <!-- Subtitle: EDUCATION CONSULTANTS (Solid Slate/Black) -->
    <text x="2" y="102" font-family="'Segoe UI', 'Outfit', system-ui, sans-serif" font-size="13.5" font-weight="800" fill="#1e293b" letter-spacing="4.5px">
      EDUCATION CONSULTANTS
    </text>
  </g>
</svg>
