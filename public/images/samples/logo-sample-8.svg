<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="100%" height="100%">
  <defs>
    <filter id="shadowS8" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- LEFT STUDIO ZONE (Center at x=70, y=70): Diamond Starburst & Open Book -->
  <g transform="translate(10, 10)" filter="url(#shadowS8)">
    <!-- Outer Deep Navy Diamond Badge -->
    <polygon points="60,6 114,60 60,114 6,60" fill="#0a192f" stroke="#1e293b" stroke-width="2"/>
    <!-- Inner Fine Gold Diamond Trim -->
    <polygon points="60,14 106,60 60,106 14,60" fill="none" stroke="#d4af37" stroke-width="1.8"/>

    <!-- Open Book Inside Diamond -->
    <path d="M 32 76 Q 46 70 60 76 Q 74 70 88 76 L 86 56 Q 74 50 60 56 Q 46 50 34 56 Z" fill="#ffffff"/>
    <path d="M 34 73 Q 47 68 60 73 Q 73 68 86 73 L 84 55 Q 73 49 60 55 Q 47 49 36 55 Z" fill="#e2e8f0"/>
    <line x1="60" y1="55" x2="60" y2="76" stroke="#0a192f" stroke-width="1.5"/>

    <!-- Radiant Golden Starburst Shining Above Book -->
    <g transform="translate(60, 38)">
      <!-- 8-Point Starburst -->
      <polygon points="0,-14 3,-3 14,0 3,3 0,14 -3,3 -14,0 -3,-3" fill="#facc15"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff"/>
    </g>
  </g>

  <!-- RIGHT STUDIO ZONE (x=145 to 470): Exact Requested Typography Writing Colors & Hierarchy -->
  <g transform="translate(148, 0)">
    <!-- Main Wordmark: EURO (Solid Black) + WORLD (Crimson Red) -->
    <text x="0" y="68" font-family="'Times New Roman', 'Georgia', 'Cinzel', serif" font-size="44" font-weight="900" letter-spacing="1.5px">
      <tspan fill="#0f172a">EURO</tspan><tspan fill="#a81c1c">WORLD</tspan>
    </text>

    <!-- Studio-Grade Precision Divider Line -->
    <line x1="2" y1="80" x2="315" y2="80" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="80" x2="85" y2="80" stroke="#a81c1c" stroke-width="3" stroke-linecap="round"/>

    <!-- Subtitle: EDUCATION CONSULTANTS (Solid Slate/Black) -->
    <text x="2" y="102" font-family="'Segoe UI', 'Outfit', system-ui, sans-serif" font-size="13.5" font-weight="800" fill="#1e293b" letter-spacing="4.5px">
      EDUCATION CONSULTANTS
    </text>
  </g>
</svg>
