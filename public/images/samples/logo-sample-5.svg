<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 140" width="100%" height="100%">
  <defs>
    <filter id="shadowS5" x="-10%" y="-10%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- LEFT STUDIO ZONE (Center at x=70, y=70): Greek Pillar Arch of Knowledge -->
  <g transform="translate(10, 10)" filter="url(#shadowS5)">
    <!-- Base Steps -->
    <rect x="14" y="104" width="92" height="6" rx="2" fill="#0f172a"/>
    <rect x="20" y="98" width="80" height="6" fill="#1e293b"/>

    <!-- Three Classical Pillars (Doric Columns) -->
    <rect x="28" y="50" width="12" height="48" fill="#0f172a"/>
    <rect x="54" y="50" width="12" height="48" fill="#0f172a"/>
    <rect x="80" y="50" width="12" height="48" fill="#0f172a"/>
    <!-- Column Flutes -->
    <line x1="34" y1="50" x2="34" y2="98" stroke="#334155" stroke-width="1.5"/>
    <line x1="60" y1="50" x2="60" y2="98" stroke="#334155" stroke-width="1.5"/>
    <line x1="86" y1="50" x2="86" y2="98" stroke="#334155" stroke-width="1.5"/>

    <!-- Arch Pediment Roof & Tympanum -->
    <polygon points="60,14 14,46 106,46" fill="#0f172a"/>
    <polygon points="60,24 28,44 92,44" fill="#f8fafc"/>

    <!-- Crimson Rising Sun/Globe Inside Pediment -->
    <circle cx="60" cy="38" r="8" fill="#a81c1c"/>
    <circle cx="60" cy="38" r="4" fill="#d4af37"/>

    <!-- Center Open Book Between Columns -->
    <path d="M 44 76 Q 52 72 60 76 Q 68 72 76 76 L 74 62 Q 68 58 60 62 Q 52 58 46 62 Z" fill="#a81c1c"/>
    <path d="M 45 74 Q 52.5 70 60 74 Q 67.5 70 75 74 L 73 61 Q 67.5 57 60 61 Q 52.5 57 47 61 Z" fill="#ffffff"/>
  </g>

  <!-- RIGHT STUDIO ZONE (x=145 to 470): Exact Requested Typography Writing Colors & Hierarchy -->
  <g transform="translate(148, 0)">
    <!-- Main Wordmark: EURO (Solid Black) + WORLD (Crimson Red) -->
    <text x="0" y="68" font-family="'Times New Roman', 'Georgia', 'Cinzel', serif" font-size="44" font-weight="900" letter-spacing="1.5px">
      <tspan fill="#0f172a">EURO</tspan><tspan fill="#a81c1c">WORLD</tspan>
    </text>

    <!-- Studio-Grade Precision Divider Line -->
    <line x1="2" y1="80" x2="315" y2="80" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="2" y1="80" x2="85" y2="80" stroke="#a81c1c" stroke-width="3" stroke-linecap="round"/>

    <!-- Subtitle: EDUCATION CONSULTANTS (Solid Slate/Black) -->
    <text x="2" y="102" font-family="'Segoe UI', 'Outfit', system-ui, sans-serif" font-size="13.5" font-weight="800" fill="#1e293b" letter-spacing="4.5px">
      EDUCATION CONSULTANTS
    </text>
  </g>
</svg>
